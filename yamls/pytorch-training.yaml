apiVersion: v1
kind: Pod
metadata:
  name: tutorial-<username>-gp3
  namespace: nrp-training-k8s
spec:
  restartPolicy: Never
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nrp-training
            operator: In
            values: ["true"]
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-A10
  tolerations:
  - key: nautilus.io/reservation
    operator: Equal
    value: nrp
    effect: NoSchedule
  volumes:
  - name: scratch
    emptyDir: {}
  containers:
  - name: mypod
    image: nvcr.io/nvidia/pytorch:23.07-py3
    resources:
      limits:
        memory: 16Gi
        cpu: 4
        nvidia.com/gpu: 1
      requests:
        memory: 16Gi
        cpu: 4
        nvidia.com/gpu: 1
    command: ["/bin/bash", "-c"]
    args:
    - >-
        cd /scratch;
        wget https://raw.githubusercontent.com/pytorch/examples/main/mnist/main.py;
        nvidia-smi;
        python3 main.py;
    volumeMounts:
            - name: scratch
              mountPath: /scratch
