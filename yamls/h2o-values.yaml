h2ogpt:
  enabled: true
  image:
    repository: h2oairelease/h2oai-h2ogpt-runtime
    tag: v0.2.0-591
  stack:
    enabled: true
  storage:
    size: 15Gi
    class: rook-ceph-block
    useEphemeral: false

  # -- Example configs to use when not using Model Lock and External LLM
  overrideConfig:
    enforce_h2ogpt_api_key: False
    enforce_h2ogpt_ui_key: False
    base_model: h2oai/h2o-danube2-1.8b-chat
    use_safetensors: True
    prompt_type: llama2
    save_dir: /workspace/save/
    use_gpu_id: False
    score_model: None
    max_max_new_tokens: 512
    max_new_tokens: 256

  podSecurityContext:
    fsGroup: null
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault

  updateStrategy:
    type: Recreate

  service:
    type: ClusterIP

  resources:
    requests:
      cpu: 1
      memory: 4Gi
    limits:
      cpu: 4
      memory: 4Gi

  extraAffinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nrp-training
            operator: In
            values: ["true"]
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-A10

  tolerations:
  - key: nautilus.io/reservation
    operator: Equal
    value: nrp
    effect: NoSchedule
vllm:
  enabled: true

  storage:
    size: 15Gi
    class: rook-ceph-block
    useEphemeral: false
  
  podSecurityContext:
    fsGroup: null
    runAsGroup: 0
    runAsNonRoot: false
    runAsUser: 0

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    runAsNonRoot: false
    seccompProfile: null

  extraAffinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nrp-training
            operator: In
            values: ["true"]
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-A10

  tolerations:
  - key: nautilus.io/reservation
    operator: Equal
    value: nrp
    effect: NoSchedule
  
  containerArgs:
    - "--model"
    - h2oai/h2o-danube2-1.8b-chat
    - "--tensor-parallel-size"
    - 1
    - "--seed"
    - 1234
    - "--trust-remote-code"

  updateStrategy:
    type: Recreate
  resources:
    requests:
      cpu: 2
      memory: 8Gi
      nvidia.com/gpu: 1
    limits:
      cpu: 4
      memory: 8Gi
      nvidia.com/gpu: 1
