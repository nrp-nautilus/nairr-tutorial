apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  generateName: sc24-mpi-tensorflow-
  namespace: nrp-training-k8s
spec:
  slotsPerWorker: 1
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
         spec:
           tolerations:
           - key: nautilus.io/reservation
             operator: Equal
             value: nrp
             effect: NoSchedule
           affinity:
             nodeAffinity:
               preferredDuringSchedulingIgnoredDuringExecution:
               - weight: 100
                 preference:
                   matchExpressions:
                   - key: nrp-training
                     operator: In
                     values: ["true"]
           containers:
           - image: mpioperator/tensorflow-benchmarks:latest
             name: tensorflow-benchmarks
             command:
             - mpirun
             - --allow-run-as-root
             - -np
             - "2"
             - -bind-to
             - none
             - -map-by
             - slot
             - -x
             - NCCL_DEBUG=INFO
             - -x
             - LD_LIBRARY_PATH
             - -x
             - PATH
             - -mca
             - pml
             - ob1
             - -mca
             - btl
             - ^openib
             - python
             - scripts/tf_cnn_benchmarks/tf_cnn_benchmarks.py
             - --model=resnet101
             - --batch_size=64
             - --variable_update=horovod
             resources:
               limits:
                 memory: 16Gi
                 cpu: 4
               requests:
                 memory: 16Gi
                 cpu: 4
    Worker:
      replicas: 2
      template:
        spec:
          tolerations:
          - key: nautilus.io/reservation
            operator: Equal
            value: nrp
            effect: NoSchedule
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                  - key: nrp-training
                    operator: In
                    values: ["true"]
          containers:
          - image: mpioperator/tensorflow-benchmarks:latest
            name: tensorflow-benchmarks
            resources:
              limits:
                nvidia.com/gpu: 1